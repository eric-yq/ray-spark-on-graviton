# ===========================================================================
# Ray cluster launcher config  —  m7i  (Intel Sapphire Rapids, x86_64)
# Base image: Amazon Linux 2023 (standard, default kernel).
# ===========================================================================
# Launch from the CONTROL NODE, at the repo root:
#     ray up infra/ray-cluster/cluster-m7i.yaml
#
# This file is identical to cluster-m8g.yaml EXCEPT:
#   - instance types (m7i.* vs m8g.*)
#   - ImageId architecture (x86_64 vs arm64)
# Everything else (sizing, EBS, software, spill paths) is held constant so the
# comparison isolates CPU architecture.
#
# Before launching, fill the two REPLACE_ placeholders:
#   - ImageId:  run  scripts/resolve_ami.sh us-east-1 x86_64
#   - IamInstanceProfile.Name: an instance profile granting S3 read on the data
#     bucket + write on the results prefix (see README "IAM setup").
# ===========================================================================

cluster_name: bench-m7i

max_workers: 3
upscaling_speed: 3
idle_timeout_minutes: 15

provider:
  type: aws
  region: us-east-1
  availability_zone: us-east-1a        # pin one AZ -> low-jitter intra-cluster network
  cache_stopped_nodes: false           # benchmark nodes are ephemeral; terminate on `ray down`

auth:
  ssh_user: ec2-user                   # Amazon Linux 2023 default user

available_node_types:
  head:
    min_workers: 0
    max_workers: 0
    resources: {}
    node_config:
      InstanceType: m7i.2xlarge        # 8 vCPU / 32 GiB — scheduler/GCS/dashboard only
      ImageId: ami-REPLACE_X86_64      # AL2023 x86_64  (scripts/resolve_ami.sh us-east-1 x86_64)
      IamInstanceProfile:
        Name: ray-bench-node
      BlockDeviceMappings:
        - DeviceName: /dev/xvda        # AL2023 root device is xvda (NOT sda1)
          Ebs:
            VolumeSize: 150            # GiB, gp3 defaults (3000 IOPS / 125 MB/s) fine for head
            VolumeType: gp3
            DeleteOnTermination: true

  worker:
    min_workers: 3
    max_workers: 3                     # exactly 3 task nodes
    resources: {}
    node_config:
      InstanceType: m7i.4xlarge        # 16 vCPU / 64 GiB
      ImageId: ami-REPLACE_X86_64
      IamInstanceProfile:
        Name: ray-bench-node
      BlockDeviceMappings:
        - DeviceName: /dev/xvda        # SINGLE 600GB gp3 root: data scratch + Ray/Spark spill
          Ebs:
            VolumeSize: 600
            VolumeType: gp3
            Iops: 8000
            Throughput: 500            # MB/s — within m7i.4xlarge EBS bandwidth ceiling
            DeleteOnTermination: true

head_node_type: head

# Copied to every node before setup_commands run (paths relative to repo root).
file_mounts:
  "/home/ec2-user/bench/requirements.txt": "requirements.txt"
  "/home/ec2-user/bench/node_setup.sh": "infra/ray-cluster/node_setup.sh"

setup_commands:
  - bash /home/ec2-user/bench/node_setup.sh

head_start_ray_commands:
  - ray stop
  - >-
    PYSPARK_PYTHON=/usr/bin/python3.11 PYSPARK_DRIVER_PYTHON=/usr/bin/python3.11
    ray start --head --port=6379
    --temp-dir=/opt/bench/scratch/ray
    --dashboard-host=0.0.0.0
    --autoscaling-config=~/ray_bootstrap_config.yaml

worker_start_ray_commands:
  - ray stop
  - >-
    PYSPARK_PYTHON=/usr/bin/python3.11 PYSPARK_DRIVER_PYTHON=/usr/bin/python3.11
    ray start --address=$RAY_HEAD_IP:6379
    --temp-dir=/opt/bench/scratch/ray
