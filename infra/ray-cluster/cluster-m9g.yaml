# ===========================================================================
# Ray cluster launcher config  —  m9g  (AWS Graviton, aarch64)
# Base image: Amazon Linux 2023 (standard, default kernel).
# ===========================================================================
# Launch (do NOT edit this template — launch.sh renders a .local.yaml):
#     scripts/launch.sh m9g
#
# Identical to the other cluster templates EXCEPT instance types + AMI arch.
# ===========================================================================

cluster_name: bench-m9g

max_workers: 3
upscaling_speed: 3
idle_timeout_minutes: 15

provider:
  type: aws
  region: us-east-1
  availability_zone: us-east-1a
  cache_stopped_nodes: false

auth:
  ssh_user: ec2-user                   # Amazon Linux 2023 default user

available_node_types:
  head:
    min_workers: 0
    max_workers: 0
    resources: {}
    node_config:
      InstanceType: m9g.2xlarge        # 8 vCPU / 32 GiB
      ImageId: ami-REPLACE_ARM64       # AL2023 arm64  (scripts/resolve_ami.sh us-east-1 arm64)
      IamInstanceProfile:
        Name: ray-bench-node
      BlockDeviceMappings:
        - DeviceName: /dev/xvda        # AL2023 root device is xvda (NOT sda1)
          Ebs:
            VolumeSize: 150
            VolumeType: gp3
            DeleteOnTermination: true

  worker:
    min_workers: 3
    max_workers: 3
    resources: {}
    node_config:
      InstanceType: m9g.4xlarge        # 16 vCPU / 64 GiB
      ImageId: ami-REPLACE_ARM64
      IamInstanceProfile:
        Name: ray-bench-node
      BlockDeviceMappings:
        - DeviceName: /dev/xvda        # SINGLE 600GB gp3 root: data scratch + Ray/Spark spill
          Ebs:
            VolumeSize: 600
            VolumeType: gp3
            Iops: 8000
            Throughput: 500
            DeleteOnTermination: true

head_node_type: head

file_mounts:
  "/home/ec2-user/bench/requirements.txt": "requirements.txt"
  "/home/ec2-user/bench/node_setup.sh": "infra/ray-cluster/node_setup.sh"
  "/home/ec2-user/bench/ray_systemd.sh": "infra/ray-cluster/ray_systemd.sh"

setup_commands:
  - bash /home/ec2-user/bench/node_setup.sh

# Ray runs as a systemd service (Restart=always, enabled on boot) so it survives
# the account's security-baseline reboot. See infra/ray-cluster/ray_systemd.sh.
head_start_ray_commands:
  - bash /home/ec2-user/bench/ray_systemd.sh head

worker_start_ray_commands:
  - bash /home/ec2-user/bench/ray_systemd.sh worker $RAY_HEAD_IP
